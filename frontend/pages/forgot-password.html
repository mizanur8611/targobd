<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>পাসওয়ার্ড ভুলে গেছেন? — TargoBD</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#F5F5F5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{background:#fff;border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.08);}
.logo{font-weight:800;font-size:22px;margin-bottom:6px;}
.logo span{color:#FF6B00;}
h1{font-size:20px;margin:16px 0 8px;}
p.sub{color:#888;font-size:13px;margin-bottom:24px;line-height:1.6;}
label{font-size:11px;font-weight:700;color:#777;text-transform:uppercase;display:block;margin-bottom:6px;}
input{width:100%;padding:12px 14px;border:2px solid #E8E8E8;border-radius:10px;font-size:14px;outline:none;margin-bottom:16px;font-family:inherit;}
input:focus{border-color:#FF6B00;}
button{width:100%;background:linear-gradient(135deg,#FF6B00,#ff9500);color:#fff;border:none;padding:14px;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;}
button:disabled{opacity:.6;cursor:not-allowed;}
.msg{padding:12px 16px;border-radius:9px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;}
.msg.success{background:#E8FFF5;border:1.5px solid #00C853;color:#006644;}
.msg.error{background:#FFF5F5;border:1.5px solid #E53935;color:#AA0000;}
.back{display:block;text-align:center;margin-top:18px;font-size:13px;color:#FF6B00;font-weight:600;text-decoration:none;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Targo<span>BD</span></div>
  <h1>পাসওয়ার্ড ভুলে গেছেন? 🔑</h1>
  <p class="sub">চিন্তা নেই! আপনার অ্যাকাউন্টের ইমেইল দিন, আমরা একটা রিসেট লিংক পাঠিয়ে দেব।</p>

  <div id="msg" class="msg"></div>

  <label>ইমেইল</label>
  <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
  <button id="btn" onclick="sendReset()">রিসেট লিংক পাঠান →</button>

  <a href="login.html" class="back">← লগইন পেজে ফিরে যান</a>
</div>

<script>
const API_BASE = 'https://targobd.onrender.com/api';

document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendReset();
});

async function sendReset() {
  const email = document.getElementById('email').value.trim();
  const msgEl = document.getElementById('msg');
  const btn = document.getElementById('btn');

  if (!email) {
    showMsg('ইমেইল দিন', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'পাঠানো হচ্ছে...';

  try {
    const res = await fetch(`${API_BASE}/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();

    if (data.success) {
      showMsg('✅ ' + data.message, 'success');
      btn.textContent = 'লিংক পাঠানো হয়েছে ✓';
    } else {
      showMsg('❌ ' + data.message, 'error');
      btn.disabled = false;
      btn.textContent = 'রিসেট লিংক পাঠান →';
    }
  } catch (err) {
    showMsg('❌ নেটওয়ার্ক সমস্যা, আবার চেষ্টা করুন', 'error');
    btn.disabled = false;
    btn.textContent = 'রিসেট লিংক পাঠান →';
  }
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
</script>
</body>
</html>
