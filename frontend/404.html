<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>পেজ পাওয়া যায়নি — TargoBD</title>
<link rel="stylesheet" href="/css/main.css">
<style>
  .error-page { min-height:80vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 20px; }
  .error-number { font-size:120px; font-weight:700; background:linear-gradient(135deg,var(--primary),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; margin-bottom:10px; }
  .error-title { font-size:24px; font-weight:700; color:var(--text); margin-bottom:10px; }
  .error-sub { font-size:14px; color:var(--text3); margin-bottom:28px; max-width:400px; line-height:1.7; }
  .error-links { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .error-search { display:flex; gap:0; border-radius:8px; overflow:hidden; box-shadow:0 0 0 2px var(--primary); max-width:380px; margin:0 auto 24px; }
  .error-search input { flex:1; border:none; padding:11px 14px; font-size:13px; outline:none; font-family:inherit; }
  .error-search button { background:var(--primary); border:none; padding:0 18px; color:#fff; cursor:pointer; font-size:16px; }
  .popular-links { margin-top:30px; }
  .popular-title { font-size:13px; color:var(--text3); margin-bottom:12px; }
  .popular-grid { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .popular-item { background:#fff; border:1.5px solid var(--border); border-radius:8px; padding:8px 14px; font-size:12px; font-weight:600; color:var(--text2); cursor:pointer; transition:.2s; text-decoration:none; display:flex; align-items:center; gap:5px; }
  .popular-item:hover { border-color:var(--primary); color:var(--primary); }
  .floating-emoji { animation:float 3s ease-in-out infinite; display:inline-block; font-size:80px; margin-bottom:14px; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
</style>
</head>
<body>
<div id="app-header"></div>

<div class="error-page">
  <div>
    <div class="floating-emoji">😔</div>
    <div class="error-number">404</div>
    <div class="error-title">পেজটি পাওয়া যায়নি!</div>
    <div class="error-sub">আপনি যে পেজটি খুঁজছেন সেটি হয়তো সরিয়ে ফেলা হয়েছে, নাম পরিবর্তন হয়েছে, অথবা কখনো ছিলই না।</div>

    <div class="error-search">
      <input id="err-search" placeholder="পণ্য খুঁজুন..." type="text">
      <button onclick="doErrSearch()">🔍</button>
    </div>

    <div class="error-links">
      <a href="/index.html" class="btn btn-primary btn-lg">🏠 হোমপেজে যান</a>
      <a href="/pages/products.html" class="btn btn-outline btn-lg">🛍️ পণ্য দেখুন</a>
      <a href="javascript:history.back()" class="btn btn-outline btn-lg">← আগের পেজ</a>
    </div>

    <div class="popular-links">
      <div class="popular-title">জনপ্রিয় ক্যাটাগরি:</div>
      <div class="popular-grid">
        <a href="/pages/products.html?search=phone" class="popular-item">📱 মোবাইল</a>
        <a href="/pages/products.html?search=laptop" class="popular-item">💻 ল্যাপটপ</a>
        <a href="/pages/products.html?search=fashion" class="popular-item">👗 ফ্যাশন</a>
        <a href="/pages/products.html?search=home" class="popular-item">🏠 গৃহস্থালি</a>
        <a href="/pages/products.html?flash=true" class="popular-item">⚡ Flash Sale</a>
        <a href="/pages/track.html" class="popular-item">📦 অর্ডার ট্র্যাক</a>
      </div>
    </div>
  </div>
</div>

<div id="app-footer"></div>
<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
function doErrSearch() {
  const q = document.getElementById('err-search').value.trim();
  if (q) window.location.href = `/pages/products.html?search=${encodeURIComponent(q)}`;
}
document.getElementById('err-search').addEventListener('keydown', e => { if (e.key === 'Enter') doErrSearch(); });
</script>
</body>
</html>
