# Netlify deployment configuration for TargoBD Frontend

[build]
  publish = "frontend"
  command = "echo 'No build step needed'"

[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to   = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/pages/*"
  to   = "/pages/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-XSS-Protection        = "1; mode=block"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
